# Cargo configuration for mobile build targets

[build]
# Optimize for mobile targets
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
]

# Target-specific configurations
[target.aarch64-linux-android]
ar = "aarch64-linux-android-ar"
linker = "aarch64-linux-android-clang"

[target.armv7-linux-android]
ar = "armv7a-linux-android-ar"
linker = "armv7a-linux-android-clang"

[target.x86_64-linux-android]
ar = "x86_64-linux-android-ar"
linker = "x86_64-linux-android-clang"

[target.i686-linux-android]
ar = "i686-linux-android-ar"
linker = "i686-linux-android-clang"

[target.aarch64-apple-ios]
# iOS ARM64 (iPhone/iPad)

[target.aarch64-apple-ios-sim]
# iOS ARM64 Simulator (Apple Silicon Macs)

[target.x86_64-apple-ios]
# iOS x86_64 Simulator (Intel Macs)
