name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ios:
    runs-on: macos-latest

    strategy:
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Verify Xcode
        run: |
          xcode-select --print-path
          xcodebuild -version

      - name: Build release binary
        run: |
          cargo build \
            --target ${{ matrix.target }} \
            --release \
            --message-format=short

      - name: List build outputs
        run: |
          ls -la target/${{ matrix.target }}/release/
          find target/${{ matrix.target }}/release -name "*.a" | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ios-${{ matrix.target }}-release
          path: |
            target/${{ matrix.target }}/release/*.a
            target/${{ matrix.target }}/release/book_egui
          retention-days: 30

      - name: Create build report
        if: always()
        run: |
          echo "## iOS Build Report - ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "target/${{ matrix.target }}/release" ]; then
            echo "**Artifacts Found:**" >> $GITHUB_STEP_SUMMARY
            find target/${{ matrix.target }}/release -type f -name "*.a" | while read f; do
              size=$(du -h "$f" | cut -f1)
              echo "- \`$(basename $f)\` ($size)" >> $GITHUB_STEP_SUMMARY
            done
          fi
          if [ -f "target/${{ matrix.target }}/release/book_egui" ]; then
            size=$(du -h "target/${{ matrix.target }}/release/book_egui" | cut -f1)
            echo "- \`book_egui\` executable ($size)" >> $GITHUB_STEP_SUMMARY
          fi