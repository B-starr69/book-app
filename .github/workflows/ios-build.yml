name: iOS Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    # We use macos-latest to get access to Xcode and Apple SDKs
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build for iOS
        run: cargo build --target aarch64-apple-ios --release

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-binary
          # Adjust this path if your binary name is different
          path: target/aarch64-apple-ios/release/new_book_app